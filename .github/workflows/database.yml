name: Database

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  database:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.84.2
          github-token: ${{ github.token }}

      - name: Start local Supabase database
        run: supabase db start

      - name: Run database tests
        run: |
          set +e
          supabase test db > supabase-test.log 2>&1
          status=$?
          cat supabase-test.log
          exit $status

      - name: Upload database diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: database-test-diagnostics
          path: supabase-test.log
          if-no-files-found: ignore

      - name: Stop local Supabase services
        if: always()
        run: supabase stop --no-backup
