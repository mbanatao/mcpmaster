name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: |
          set +e
          npm run check > tsc.log 2>&1
          status=$?
          cat tsc.log
          exit $status

      - name: Upload compiler diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: tsc.log
          if-no-files-found: ignore

      - name: Run tests
        run: |
          set +e
          npm test > node-test.log 2>&1
          status=$?
          cat node-test.log
          exit $status

      - name: Upload Node test diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: node-test-diagnostics
          path: node-test.log
          if-no-files-found: ignore

      - name: Build container
        run: docker build -t mcpmaster-ci .

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.84.2
          github-token: ${{ github.token }}

      - name: Start local Supabase database
        run: supabase db start

      - name: Run database tests
        run: |
          set +e
          supabase test db > supabase-test.log 2>&1
          status=$?
          cat supabase-test.log
          exit $status

      - name: Upload database diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: database-test-diagnostics
          path: supabase-test.log
          if-no-files-found: ignore

      - name: Stop local Supabase services
        if: always()
        run: supabase stop --no-backup
